<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet - RD Falkenfurt</title>
    <style>
        :root {
            --falken-blue: #000e2b;
            --falken-gold: #ffd700;
            --bg-light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        header {
            background-color: var(--falken-blue);
            color: white;
            padding: 30px;
            border-bottom: 5px solid var(--falken-gold);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .logo { 
            max-height: 120px; 
            margin-bottom: 15px; 
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin: 40px auto;
            display: grid;
            /* Definiert zwei Spalten */
            grid-template-columns: 1fr 1fr; 
            gap: 25px;
        }

        .dashboard-card {
            background: white;
            border: 3px solid var(--falken-blue);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--falken-blue);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .dashboard-card:hover {
            transform: translateY(-10px);
            background-color: var(--falken-gold);
            border-color: var(--falken-gold);
        }

        /* Spezial-Regel für die Pyramiden-Form (die 3. Karte) */
        .dashboard-card:last-child {
            grid-column: span 2; /* Nimmt den Platz von 2 Spalten ein */
            justify-self: center; /* Zentriert die Karte in diesem Platz */
            width: calc(50% - 12.5px); /* Macht sie exakt so breit wie die anderen (50% minus halber Gap) */
        }

        .icon { 
            font-size: 4em; 
            margin-bottom: 15px; 
        }
        
        .card-title { 
            font-size: 1.5em; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        .card-desc { 
            font-size: 0.9em; 
            color: #555; 
            margin-top: 10px; 
        }

        /* Responsive Design für Handys */
        @media (max-width: 600px) {
            .container { 
                grid-template-columns: 1fr; 
            }
            .dashboard-card:last-child {
                grid-column: span 1;
                width: 100%;
            }
        }

        footer {
            margin-top: auto; 
            padding: 20px; 
            color: #888; 
            font-size: 0.8em;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <img src="https://r2.fivemanage.com/duNnRRRqkxrMPfikEWhQR/Bild_2026-03-21_105520774-removebg-preview.png" alt="Logo" class="logo">
    <h1 style="margin: 0; letter-spacing: 2px;">INTRANET FALKENFURT</h1>
    <div style="color: var(--falken-gold); font-weight: bold; margin-top: 5px;">Zentrales Wissensmanagement</div>
</header>

<div class="container">
    
    <a href="medis.html" class="dashboard-card">
        <div class="icon">💊</div>
        <div class="card-title">Medikamente</div>
        <div class="card-desc">Dosierungen, Indikationen & Kontraindikationen</div>
    </a>

    <a href="wdb.html" class="dashboard-card">
        <div class="icon">📋</div>
        <div class="card-title">Leitlinien (WDB)</div>
        <div class="card-desc">Medizinische Algorithmen & Handlungsanweisungen</div>
    </a>

    <a href="dienstplan.html" class="dashboard-card">
        <div class="icon">🗓️</div>
        <div class="card-title">DIENSTPLAN</div>
        <div class="card-desc">Dienstpläne & Ansprechpartner</div>
    </a>

</div>

<footer>
    © 2026 Rettungsdienst Falkenfurt | Ärztliche Leitung Rettungsdienst
</footer>

</body>
</html>
