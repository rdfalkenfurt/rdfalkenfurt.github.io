<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medikamenten-Freigabe Stadt Falkenfurt</title>
    <style>
        :root {
            --falken-blue: #000e2b;
            --falken-gold: #ffd700;
            --bg-light: #f4f4f4;
            --indikation-blue: #e6f0ff;
            --ki-red: #ffe6e6;
            --nfs-blue: #0056b3;
            --rs-green: #28a745;
            --na-red: #c80000;
        }

        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: var(--falken-blue);
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticky-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--falken-blue);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 5px solid var(--falken-gold);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 900px;
        }

        .logo { height: 200px; margin-bottom: 10px; width: auto;}

        .title-group {
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-size: 2.2em;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .signature {
            font-size: 0.9em;
            color: var(--falken-gold);
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 25px;
            border: 2px solid var(--falken-gold);
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            background: var(--falken-gold);
            color: var(--falken-blue);
            transform: translateY(-2px);
        }

        .nav-active {
            background: var(--falken-gold);
            color: var(--falken-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .search-container {
            width: 90%;
            max-width: 500px;
            margin: 15px 0;
        }

        #medSearch {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid var(--falken-gold);
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            background-color: white;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 8px 18px;
            border: 2px solid var(--falken-gold);
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .tab-btn.active { background-color: var(--falken-gold); color: var(--falken-blue); }

        .container { max-width: 850px; margin: 20px auto; padding: 10px; }

        .med-card {
            background: white;
            border: 2px solid var(--falken-blue);
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .med-header {
            background-color: #f5f5f5;
            padding: 12px 15px;
            font-size: 1.3em;
            font-weight: bold;
            border-bottom: 2px solid var(--falken-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag { font-size: 0.5em; padding: 4px 8px; border-radius: 4px; color: white; text-transform: uppercase; }
        .tag-rs { background-color: var(--rs-green); }
        .tag-nfs { background-color: var(--nfs-blue); }
        .tag-na { background-color: var(--na-red); }
        .tag-calc { background-color: #6f42c1; }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; }
        .section-box { padding: 12px; border: 1px solid #eee; font-size: 0.9em; }
        .section-title { font-weight: bold; font-size: 0.8em; margin-bottom: 5px; color: var(--falken-blue); text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .indikation { background-color: var(--indikation-blue); }
        .ki { background-color: var(--ki-red); }

        .dosis-center { background-color: var(--falken-gold); padding: 8px; text-align: center; font-weight: bold; border-top: 1px solid var(--falken-blue); border-bottom: 1px solid var(--falken-blue); }
        .dosis-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .dosis-box { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 0.85em; }

        .besonderheiten { border: 2px solid #c80000; padding: 12px; margin: 10px; font-style: italic; font-size: 0.85em; background-color: #fffafa; }
        .bes-title { color: #c80000; font-weight: bold; font-style: normal; margin-bottom: 3px; text-transform: uppercase; }

        /* RECHNER STYLES */
        .calc-container {
            background: white;
            border: 3px solid var(--falken-blue);
            padding: 20px;
            border-radius: 10px;
        }
        .calc-input-group {
            margin-bottom: 15px;
        }
        .calc-input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .calc-input-group input, .calc-input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        .calc-result {
            margin-top: 20px;
            padding: 15px;
            background: var(--indikation-blue);
            border-left: 5px solid var(--nfs-blue);
            font-size: 1.2em;
            font-weight: bold;
            display: none;
        }

        .footer-sig { text-align: right; padding: 5px 15px; font-size: 0.7em; color: #777; font-style: italic; }
        
        @media (max-width: 600px) { 
            .grid-row, .dosis-grid { grid-template-columns: 1fr; } 
            .header-top { flex-direction: column; text-align: center; gap: 10px; }
            .main-title { font-size: 1.6em; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <img src="https://r2.fivemanage.com/duNnRRRqkxrMPfikEWhQR/Unbenannt.png" alt="Logo Falkenfurt" class="logo">
        <div class="title-group">
            <h1 class="main-title">RETTUNGSDIENST FALKENFURT</h1>
            <div class="signature">Freigabe ÄLRD Dr. med. Leon Müller | Stand: 21.03.2026</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link">🏠 INTRANET</a>
        <a href="medis.html" class="nav-link nav-active">💊 MEDIKAMENTE</a>
        <a href="wdb.html" class="nav-link">📋 LEITLINIEN (WDB)</a>
        <a href="dienstplan.html" class="nav-link">🗓️ DIENSTPLAN</a>
    </nav>
</header>

<div class="sticky-container">
    <div class="search-container" id="search-box">
        <input type="text" id="medSearch" placeholder="Medikament oder Wirkstoff suchen..." onkeyup="searchMeds()">
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchView('rs', this)">RS</button>
        <button class="tab-btn" onclick="switchView('nfs', this)">NFS</button>
        <button class="tab-btn" onclick="switchView('na', this)">NA</button>
        <button class="tab-btn" style="border-color: 
#ffd700;" onclick="switchView('calc', this)">🧮 DOSIERUNGSRECHNER</button>
    </div>
</div>

<div class="container" id="med-container"></div>

<script>
    // Daten für die Kartenansicht
const rs_data = [
    { name: "Suprarenin", wirkstoff: "Adrenalin", ind: "Herz-Lungen-Wiederbelebung (Reanimation).", ki: "Keine in der Notfallsituation.", erw: "1 mg alle 3-5 min i.v.", kind: "0,01 mg/kg (10 µg/kg) i.v.", app: "i.v. | i.o.", bes: "Standard: 1mg Adrenalin auf 10ml NaCl (1:10.000)." },
    { name: "Glucose 10%", wirkstoff: "Glucose", ind: "Hypoglykämie (BZ < 60 mg/dl).", ki: "Keine relevanten KI.", erw: "100 - 200 ml (10-20g) i.v.", kind: "2 ml/kg KG i.v. (langsam!)", app: "i.v. | p.o.", bes: "Nur bei sicherem i.v. Zugang (Nekrosegefahr)!" },
    { name: "NaCl 0,9 %", wirkstoff: "Natriumchloridlösung", ind: "Trägerlösung, Spülung.", ki: "Keine.", erw: "Nach Indikation.", kind: "Nach Indikation.", app: "i.v. | i.o. | lokal", bes: "Standard für Medikamentenverdünnung." },
    { name: "Jonosteril", wirkstoff: "Isotone Elektrolytlösung", ind: "Volumensubstitution.", ki: "Lungenödem.", erw: "500 - 1000 ml i.v.", kind: "20 ml/kg KG i.v.", app: "i.v.", bes: "Kristalloide Lösung der Wahl." }
];

const nfs_data = [
    { name: "Akrinor", wirkstoff: "Cafedrin + Theodrenalin", ind: "Hypotonie", ki: "Glaukom, Tachyarrhythmie", erw: "0,5 - 1 ml i.v. titriert", kind: "Keine Empfehlung", app: "i.v.", bes: "Blutdrucksteigernd, positiv inotrop." },
    { name: "Suprarenin", wirkstoff: "Adrenalin", ind: "Anaphylaxie, Bradykardie, Pseudokrupp", ki: "Keine im Notfall", erw: "Anaphylaxie: 0,5 mg i.m. | Brady: Perfusor", kind: "Anaphylaxie: 0,01 mg/kg i.m.", app: "i.m. | i.v. | Inhal.", bes: "Inhalation bei Pseudokrupp: 2-5 mg pur." },
    { name: "Urapidil", wirkstoff: "Urapidil", ind: "Hypertensive Krise", ki: "Aortenstenose", erw: "5 - 12,5 mg i.v. langsam", kind: "Keine Empfehlung", app: "i.v.", bes: "Alpha-1-Blocker. RR-Senkung max. 20%." },
    { name: "Midazolam", wirkstoff: "Midazolam", ind: "Krampfanfall, ACS (Sedierung)", ki: "Schwere Ateminsuffizienz", erw: "Krampf: 10 mg i.n. | Sed: 1 - 2 mg i.v.", kind: "0,1 mg/kg i.v. | 0,2 mg/kg i.n.", app: "i.v. | i.n.", bes: "Kurze Halbwertszeit, Atemweg sichern." },
    { name: "Morphin", wirkstoff: "Morphin", ind: "Starke Schmerzen (NRS > 6)", ki: "SpO2 < 90, AF < 10, GCS < 14", erw: "2 - 3 mg i.v. (alle 5 Min. titrieren)", kind: "0,1 mg/kg i.v. (sehr langsam)", app: "i.v.", bes: "Standard-Analgetikum, Monitoring Pflicht!" },
    { name: "Esketamin", wirkstoff: "Esketamin", ind: "Trauma-Schmerz, Narkose", ki: "ACS, schwere Hypertonie", erw: "Analgesie: 0,125 mg/kg | Narkose: 0,5 mg/kg", kind: "Analgesie: 0,25 mg/kg i.v.", app: "i.v. | i.n.", bes: "Analgesie immer in Kombi mit Midazolam!" },
    { name: "Novalgin", wirkstoff: "Metamizol", ind: "Koliken, Fieber, Schmerz", ki: "Asthma, Schwangerschaft", erw: "1 g (2,5 ml) Kurzinfusion", kind: "10 - 15 mg/kg KG Kurzinfusion", app: "i.v. Inf.", bes: "Gefahr des RR-Abfalls bei zu schneller Gabe." },
    { name: "Paracetamol", wirkstoff: "Paracetamol", ind: "Fieber, leichte Schmerzen", ki: "Leberinsuffizienz", erw: "1 g i.v. (über 15 Min.)", kind: "15 mg/kg KG i.v.", app: "i.v.", bes: "Max. 4g Tagesdosis beachten." },
    { name: "Vomex", wirkstoff: "Dimenhydrinat", ind: "Übelkeit, Erbrechen", ki: "Glaukom, Epilepsie, < 6 kg KG", erw: "62,5 mg (1 Amp.) i.v. langsam", kind: "1,25 mg/kg KG i.v.", app: "i.v.", bes: "Nicht bei Kindern unter 6 kg anwenden." },
    { name: "VEL", wirkstoff: "Vollelektrolytlösung", ind: "Standardinfusion", ki: "Keine", erw: "Nach Bedarf", kind: "Nach Bedarf", app: "i.v.", bes: "z.B. Sterofundin, Jonosteril." }
];

const na_data = [
    { name: "Fentanyl", wirkstoff: "Fentanyl", ind: "Narkose, starke Schmerzen", ki: "Fehlende Beatmungsmöglichkeit", erw: "0,1 - 0,2 mg i.v. (Narkose)", kind: "1 - 3 µg/kg i.v. (0,001-0,003 mg)", app: "i.v.", bes: "Starke Atemdepression! Monitoring." },
    { name: "Sufentanil", wirkstoff: "Sufentanil", ind: "Narkoseeinleitung", ki: "Atemdepression", erw: "10 - 20 µg i.v. (0,01-0,02 mg)", kind: "0,1 - 0,2 µg/kg i.v.", app: "i.v.", bes: "Sehr potent, Opioid-Perfusor Standard." },
    { name: "Piritramid", wirkstoff: "Dipidolor", ind: "Posttraumatische Schmerzen", ki: "Atemdepression", erw: "7,5 - 15 mg i.v. langsam", kind: "0,05 - 0,1 mg/kg KG i.v.", app: "i.v.", bes: "Geringeres Emesis-Risiko als Morphin." },
    { name: "Propofol", wirkstoff: "Propofol 1%", ind: "Narkose, Sedierung", ki: "Soja-/Eiallergie, Schock", erw: "1,5 - 2,5 mg/kg KG i.v.", kind: "2,5 - 4 mg/kg KG i.v.", app: "i.v.", bes: "Wirkt nur hypnotisch, nicht analgetisch!" },
    { name: "Thiopental", wirkstoff: "Trapanal", ind: "Status epilepticus, Narkose", ki: "Schock, Asthma", erw: "3 - 5 mg/kg KG i.v.", kind: "4 - 5 mg/kg KG i.v.", app: "i.v.", bes: "RR-Abfall, streng i.v. (Nekrosen)!" },
    { name: "Beloc", wirkstoff: "Metoprolol", ind: "Tachyarrhythmie, Hypertonie", ki: "AV-Block II/III, Bradykardie", erw: "2,5 - 5 mg i.v. (max. 15 mg)", kind: "Keine Empfehlung", app: "i.v.", bes: "Vorsicht bei obstruktiven Atemwegen." },
    { name: "Anexate", wirkstoff: "Flumazenil", ind: "Benzodiazepin-Antagonisierung", ki: "Mischintoxikation, Epilepsie", erw: "0,2 mg i.v., alle 60 Sek. (max. 1 mg)", kind: "0,01 mg/kg KG i.v.", app: "i.v.", bes: "Kurze Wirkdauer, Nachsedierung beachten!" },
    { name: "Narcanti", wirkstoff: "Naloxon", ind: "Opioid-Antagonisierung", ki: "Bekannte Abhängigkeit", erw: "0,1 - 0,4 mg i.v. titriert", kind: "0,01 mg/kg KG i.v.", app: "i.v. | i.n.", bes: "Re-Narkosegefahr (Opioid wirkt länger)!" },
    { name: "Bluttransfusion", wirkstoff: "Blutplasma", ind: "Blutverlust, Gerinnungsstörung", ki: "keine relevanten KI", erw: "100ml bis 1000ml", kind: "100ml bis 1000ml", app: "i.v.", bes: "Gekühlte Lagerung" }
];

    // Daten für den Rechner (mg pro kg)
const calc_meds = {
    // --- AUS NFS_DATA ---
    "esketamin_analgesie": { name: "Esketamin (Analgesie)", dose: 0.125, unit: "mg", label: "0,125 mg/kg", konz: 5 }, 
    "esketamin_narkose": { name: "Esketamin (Narkose)", dose: 0.5, unit: "mg", label: "0,5 mg/kg", konz: 5 },
    "morphin": { name: "Morphin", dose: 0.1, unit: "mg", label: "0,1 mg/kg", konz: 1 }, 
    "paracetamol": { name: "Paracetamol", dose: 15, unit: "mg", label: "15 mg/kg", konz: 10 }, 
    "vomex": { name: "Vomex", dose: 1.25, unit: "mg", label: "1,25 mg/kg", konz: 12.5 }, 
    
    // --- AUS NA_DATA ---
    "fentanyl_kind": { name: "Fentanyl (Kind)", dose: 0.002, unit: "mg", label: "2 µg/kg", konz: 0.05 }, // 2 µg = 0,002 mg
    "sufentanil": { name: "Sufentanil", dose: 0.00015, unit: "mg", label: "0,15 µg/kg", konz: 0.005 }, // 0,15 µg = 0,00015 mg
    "piritramid": { name: "Piritramid (Dipidolor)", dose: 0.1, unit: "mg", label: "0,1 mg/kg", konz: 7.5 },
    "propofol": { name: "Propofol", dose: 2, unit: "mg", label: "2 mg/kg", konz: 10 }, 
    "thiopental": { name: "Thiopental", dose: 4, unit: "mg", label: "4 mg/kg", konz: 25 },
    "flumazenil_kind": { name: "Flumazenil (Kind)", dose: 0.01, unit: "mg", label: "0,01 mg/kg", konz: 0.1 },
    "naloxon_kind": { name: "Naloxon (Kind)", dose: 0.01, unit: "mg", label: "0,01 mg/kg", konz: 0.4 },

    // --- AUS RS_DATA / SONSTIGE ---
    "midazolam_kind": { name: "Midazolam (Kind)", dose: 0.2, unit: "mg", label: "0,2 mg/kg", konz: 1 },
    "urapidil": { name: "Urapidil", dose: 0.5, unit: "mg", label: "max. 0,5 mg/kg", konz: 5 },
    "supra_anaphylaxie": { name: "Adrenalin (Anaph. Kind)", dose: 0.01, unit: "mg", label: "0,01 mg/kg", konz: 0.1 }
};

    function render(type) {
        const container = document.getElementById('med-container');
        const searchBox = document.getElementById('search-box');
        container.innerHTML = '';
        
        if (type === 'calc') {
            searchBox.style.display = 'none';
            renderCalculator();
            return;
        }

        searchBox.style.display = 'block';
        let data, tagClass, label;
        if(type === 'rs') { data = rs_data; tagClass = 'tag-rs'; label = 'RS'; }
        else if(type === 'nfs') { data = nfs_data; tagClass = 'tag-nfs'; label = 'NFS'; }
        else { data = na_data; tagClass = 'tag-na'; label = 'NA'; }

        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'med-card';
            card.setAttribute('data-name', m.name.toLowerCase());
            card.setAttribute('data-wirkstoff', m.wirkstoff.toLowerCase());
            card.innerHTML = `
                <div class="med-header">
                    <span>${m.name.toUpperCase()} <small>(${m.wirkstoff})</small></span>
                    <span class="tag ${tagClass}">${label}</span>
                </div>
                <div class="grid-row">
                    <div class="section-box indikation"><div class="section-title">Indikation</div>${m.ind}</div>
                    <div class="section-box ki"><div class="section-title">Kontraindikation</div>${m.ki}</div>
                </div>
                <div class="dosis-center">DOSIERUNG & APPLIKATION</div>
                <div class="dosis-grid">
                    <div class="dosis-box"><strong>Erwachsene</strong><br>${m.erw}</div>
                    <div class="dosis-box"><strong>Kinder</strong><br>${m.kind}</div>
                </div>
                <div class="besonderheiten">
                    <div class="bes-title">Cave / Besonderheiten</div>
                    <strong>App:</strong> ${m.app || 'i.v.'}<br>${m.bes}
                </div>
                <div class="footer-sig">Freigabe ÄLRD Müller | 21.03.2026</div>
            `;
            container.appendChild(card);
        });
                if(type === 'na') {
            const hint = document.createElement('div');
            hint.className = 'gen-hint';
            hint.innerText = "Selbstverständlich sind alle anderen Medikamente die nicht aufgelistet sind freigegeben (Generalfreigabe).";
            container.appendChild(hint);
        }
    }

    function renderCalculator() {
        const container = document.getElementById('med-container');
        container.innerHTML = `
            <div class="calc-container">
                <h2 style="margin-top:0;">🧮 Dosierungsrechner</h2>
                <div class="calc-input-group">
                    <label>Medikament:</label>
                    <select id="calcMed" onchange="calculate()">
                        <option value="">-- Bitte wählen --</option>
                        ${Object.keys(calc_meds).map(key => `<option value="${key}">${calc_meds[key].name}</option>`).join('')}
                    </select>
                </div>
                <div class="calc-input-group">
                    <label>Gewicht (kg):</label>
                    <input type="number" id="weight" placeholder="z.B. 80" onkeyup="calculate()" onchange="calculate()">
                </div>
                <div id="calcResult" class="calc-result"></div>
            </div>
        `;
    }

    function calculate() {
        const medKey = document.getElementById('calcMed').value;
        const weightInput = document.getElementById('weight').value;
        const resultDiv = document.getElementById('calcResult');

        if (medKey && weightInput > 0) {
            const weight = parseFloat(weightInput);
            const med = calc_meds[medKey];
            
            const mgDose = med.dose * weight;
            const mlDose = mgDose / med.konz;
            const mcgDose = mgDose * 1000;

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="font-size: 0.9em; color: #666; font-weight: normal;">AUFZUZIEHENDE MENGE:</div>
                <div style="font-size: 2.5em; color: #1b5e20; margin: 5px 0;"><strong>${mlDose.toLocaleString('de-DE', {minimumFractionDigits: 1, maximumFractionDigits: 2})} ml</strong></div>
                <hr>
                <div style="display: flex; justify-content: space-between; font-size: 1.1em;">
                    <span>Dosis: <strong>${mgDose.toLocaleString('de-DE', {maximumFractionDigits: 2})} mg</strong></span>
                    <span style="color:#c80000;">(${mcgDose.toLocaleString('de-DE')} µg)</span>
                </div>
                <div style="font-size: 0.75em; color: #555; margin-top: 10px; font-weight: normal; background: #eee; padding: 5px;">
                    Grundlage: ${med.label} | Konz: ${med.konz} mg/ml
                </div>
            `;
        } else {
            resultDiv.style.display = 'none';
        }
    }

    function switchView(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(type);
    }

    function searchMeds() {
        const input = document.getElementById('medSearch').value.toLowerCase();
        document.querySelectorAll('.med-card').forEach(card => {
            const name = card.getAttribute('data-name');
            const wirkstoff = card.getAttribute('data-wirkstoff');
            card.style.display = (name.includes(input) || wirkstoff.includes(input)) ? "block" : "none";
        });
    }

    // Start mit RS
    render('rs');
</script>
</body>
</html>
